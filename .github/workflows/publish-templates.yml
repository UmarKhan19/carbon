name: Publish backup templates

# Manual only. Publishes the repo-committed onboarding backup templates
# (packages/database/supabase/backups/*.carbon.json.gz) and their storage assets
# into every workspace. Idempotent: anything that already exists is skipped, so
# re-running is a cheap no-op. To overwrite (republish an updated template), run
# with `force` = true.
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Overwrite templates/assets that already exist"
        type: boolean
        default: false

jobs:
  publish:
    name: Publish templates
    runs-on: ubuntu-latest

    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upload backup templates
        run: pnpm --filter ci ci:upload-backup-templates ${{ inputs.force && '--force' || '' }}
