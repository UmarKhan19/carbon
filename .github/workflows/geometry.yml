name: Geometry Service

on:
  pull_request:
    branches: [main]
    paths:
      - "services/geometry/**"
      - ".github/workflows/geometry.yml"
  push:
    branches: [main]
    paths:
      - "services/geometry/**"
      - ".github/workflows/geometry.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/geometry
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/geometry/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g @gltf-transform/cli@4.4.0
      - run: pip install -e ".[dev]"
      - run: pytest -q

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/geometry
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
