name: Check Lint and Types

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            docs/node_modules
            packages/*/node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      # Always install so the postinstall generates the gitignored font data.
      - run: pnpm install --frozen-lockfile

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            docs/node_modules
            packages/*/node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      # Always install so the postinstall generates the gitignored font data.
      - run: pnpm install --frozen-lockfile

      - run: pnpm exec biome check

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            docs/node_modules
            packages/*/node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      # Always install so the postinstall generates the gitignored font data.
      - run: pnpm install --frozen-lockfile

      - run: pnpm run typegen
      - run: pnpm run typecheck

  lingui:
    name: Lingui
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            docs/node_modules
            packages/*/node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      # Always install so the postinstall generates the gitignored font data.
      - run: pnpm install --frozen-lockfile

      - run: pnpm run lingui:check

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            docs/node_modules
            packages/*/node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      # Always install so the postinstall generates the gitignored font data.
      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm audit --audit-level=critical || true
