[workspace]
resolver = "2"
members = [
    "cad-common",
    "cad-parser",
    "cad-simulator",
    "cad-server",
    "cad-wasm",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Carbon Team"]

[workspace.dependencies]
# Math and geometry
nalgebra = { version = "0.33", features = ["serde-serialize"] }
parry3d = "0.17"
rapier3d = "0.22"

# CAD file parsing (truck ecosystem)
truck-stepio = "0.4"
truck-modeling = "0.6"
truck-polymesh = "0.6"

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Web framework
axum = { version = "0.7", features = ["macros", "multipart"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# glTF/GLB loading
gltf = "1.4"
base64 = "0.22"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# WASM
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }

# UUID generation
uuid = { version = "1.0", features = ["v4", "serde", "js"] }

[profile.release]
lto = true
opt-level = 3
codegen-units = 1
