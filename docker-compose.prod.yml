###############################################################################
# Carbon — production stack. Self-host everything on one host, or run apps-only
# against managed backends.
#
#   cp .env.production.example .env.production   # then fill it in
#   node scripts/gen-supabase-keys.mjs           # paste the 3 keys
#
# Self-host (full data plane):
#   docker compose -f docker-compose.prod.yml --env-file .env.production \
#     --profile data up -d postgres
#   docker compose ... --profile data run --rm migrate     # apply schema
#   docker compose ... --profile data up -d                # rest of data plane
#   docker compose ... up -d                                # erp + mes + caddy
#
# Managed backends: skip --profile data, set SUPABASE_*/REDIS_URL/INNGEST_* to
# your external services, then `docker compose ... up -d`.
#
# Only caddy is published (80/443). Everything else stays on the internal net.
###############################################################################

name: carbon

x-app-env: &app-env
  env_file:
    - .env.production

services:
  # ─────────────────────────── Apps (always on) ──────────────────────────────
  erp:
    <<: *app-env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: erp
    image: carbon/erp:latest
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 30s

  mes:
    <<: *app-env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: mes
    image: carbon/mes:latest
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - erp
      - mes
    ports:
      - "80:80"
      - "443:443"
    environment:
      ERP_HOST: ${ERP_HOST}
      MES_HOST: ${MES_HOST}
      SUPABASE_HOST: ${SUPABASE_HOST}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/prod/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # ──────────────── Schema migrations (one-shot, self-host) ───────────────────
  # NOTE: deliberately does NOT load .env.production — env_file would inject
  # SUPABASE_DB_URL and the supabase CLI would use it over --db-url. Postgres
  # runs with ssl=off, and the CLI (pgx) only honors disable reliably via
  # PGSSLMODE (the ?sslmode=disable URL param is flaky). Storage must be up
  # first: an early migration INSERTs into storage.buckets, which storage-api
  # creates on boot (mirrors waitForStorageReady in dev).
  migrate:
    image: carbon/erp:latest
    profiles: ["data"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_healthy
    environment:
      PGSSLMODE: disable
    working_dir: /repo/packages/database
    command:
      - sh
      - -c
      - >
        pnpm exec supabase migration up --include-all
        --db-url postgresql://supabase_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres

  # ──────────────────────── Data plane (--profile data) ───────────────────────
  postgres:
    image: supabase/postgres:15.14.1.112
    profiles: ["data"]
    restart: unless-stopped
    networks:
      default:
        aliases:
          - db
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PORT: 5432
      PGPORT: 5432
      POSTGRES_DB: postgres
      PGDATABASE: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${SUPABASE_JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgconfig:/etc/postgresql-custom
      - ./deploy/prod/postgres/01-roles.sh:/docker-entrypoint-initdb.d/zz-carbon-roles.sh:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  gotrue:
    image: supabase/gotrue:v2.189.0
    profiles: ["data"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SUPABASE_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      GOTRUE_SITE_URL: ${ERP_URL}
      GOTRUE_URI_ALLOW_LIST: ${ERP_URL},${MES_URL}
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: ${GOTRUE_SMTP_HOST}
      GOTRUE_SMTP_PORT: ${GOTRUE_SMTP_PORT}
      GOTRUE_SMTP_USER: ${GOTRUE_SMTP_USER}
      GOTRUE_SMTP_PASS: ${GOTRUE_SMTP_PASS}
      GOTRUE_SMTP_ADMIN_EMAIL: ${GOTRUE_SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_SENDER_NAME: Carbon
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_AUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${SUPABASE_AUTH_EXTERNAL_GOOGLE_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_AZURE_ENABLED: ${AZURE_AUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_AZURE_CLIENT_ID: ${SUPABASE_AUTH_EXTERNAL_AZURE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_AZURE_SECRET: ${SUPABASE_AUTH_EXTERNAL_AZURE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_AZURE_REDIRECT_URI: ${SUPABASE_AUTH_EXTERNAL_AZURE_REDIRECT_URI:-}
      GOTRUE_MAILER_TEMPLATES_MAGIC_LINK: ${ERP_URL}/templates/magic-link.html
      GOTRUE_MAILER_TEMPLATES_INVITE: ${ERP_URL}/templates/invite.html

  postgrest:
    image: postgrest/postgrest:v13.0.8
    profiles: ["data"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600

  realtime:
    image: supabase/realtime:v2.89.0
    profiles: ["data"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        aliases:
          - realtime-dev
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      METRICS_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      APP_NAME: realtime
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"

  storage:
    image: supabase/storage-api:v1.58.4
    profiles: ["data"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://postgrest:3000
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - storage:/var/lib/storage:z
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:5000/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 30

  meta:
    image: supabase/postgres-meta:v0.96.5
    profiles: ["data"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  studio:
    image: supabase/studio:2026.04.28-sha-89d08a2
    profiles: ["data"]
    restart: unless-stopped
    depends_on:
      meta:
        condition: service_started
    # Local-only admin UI — reach via SSH tunnel, never published publicly.
    ports:
      - "127.0.0.1:${STUDIO_PORT:-3900}:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: Carbon
      DEFAULT_PROJECT_NAME: Carbon
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  edge-runtime:
    image: supabase/edge-runtime:v1.74.0
    profiles: ["data"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      VERIFY_JWT: "false"
    volumes:
      - ./packages/database/supabase/functions:/home/deno/functions:ro
      - ./packages/database/src:/home/src:ro
      - ./packages/dev/docker/edge-main:/home/deno/main:ro
    command:
      - start
      - --main-service
      - /home/deno/main

  kong:
    image: kong:2.8.1
    profiles: ["data"]
    restart: unless-stopped
    depends_on:
      - gotrue
      - postgrest
      - realtime
      - storage
      - meta
      - edge-runtime
    expose:
      - "8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    volumes:
      - ./packages/dev/docker/kong.yml:/home/kong/kong.yml:ro

  redis:
    image: redis:7-alpine
    profiles: ["data"]
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  inngest:
    image: inngest/inngest:v1.19.4
    profiles: ["data"]
    restart: unless-stopped
    environment:
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY}
    # Self-hosted server. Discovers both apps over the internal network; sqlite
    # state persisted to the volume.
    command:
      - inngest
      - start
      - --sqlite-dir
      - /data
      - --sdk-url
      - http://erp:3000/api/inngest
      - --sdk-url
      - http://mes:3000/api/inngest
    expose:
      - "8288"
    volumes:
      - inngest:/data

volumes:
  pgdata:
  pgconfig:
  storage:
  inngest:
  redis-data:
  caddy-data:
  caddy-config:
